# Classic Docker Compose — uses .env file in the same directory
# Usage:
#   cp .env.example .env   # fill in credentials
#   docker compose up -d

services:
  ecoflow-dashboard:
    image: ghcr.io/win365ru/ecoflow-dashboard:latest
    # build: .  # uncomment to build locally instead
    container_name: ecoflow-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ecoflow-data:/data

volumes:
  ecoflow-data:
